# Pre-commit hooks configuration
# Uses locally installed tools (no isolated environments)
# Run: pre-commit install (first time setup)
# Run: pre-commit run --all-files (manual check)

repos:
  - repo: local
    hooks:
      # Ruff linting (check-only)
      - id: ruff
        name: ruff
        entry: ruff check --no-fix
        language: system
        types: [python]
        verbose: true

      # Ruff formatting (check-only)
      - id: ruff-format
        name: ruff-format
        entry: ruff format --check
        language: system
        types: [python]
        verbose: true

      # JSON validation
      - id: jsonlint
        name: jsonlint
        entry: uvx --from demjson3 jsonlint -S
        language: system
        types: [json]
        exclude: ^\.vscode/
        verbose: true

      # YAML validation
      - id: yamllint
        name: yamllint
        entry: >-
          uvx yamllint -d "{extends: default, rules: {line-length: {max: 120},
          document-start: disable, truthy: {check-keys: false},
          comments: {min-spaces-from-content: 1}}}"
        language: system
        types: [yaml]
        verbose: true

      # Markdown linting
      - id: pymarkdown
        name: pymarkdown
        entry: pymarkdown --config .pymarkdownlint.json scan
        language: system
        types: [markdown]
        verbose: true

      # Type checking (devcontainer only — requires HA deps installed)
      #
      # The Python package starts with a digit (e.g. `4noks_elios4you`),
      # so `ty` cannot import it directly. The canonical workaround is the
      # `fournoks_elios4you` symlink; the hook creates and removes it
      # per invocation so the working tree stays clean and the symlink never
      # shows up in `git status`. CI workflows already do the same dance.
      - id: ty
        name: ty
        entry: >-
          bash -c '
          ln -s 4noks_elios4you custom_components/fournoks_elios4you &&
          ty check --python /usr/local/bin/python custom_components/fournoks_elios4you;
          status=$?;
          rm -f custom_components/fournoks_elios4you;
          exit $status'
        language: system
        pass_filenames: false
        types: [python]
        verbose: true
